name: Naukri Profile Updater

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '15 6 * * *'   # 11:45 AM IST
    - cron: '0 9 * * *'    # 2:30 PM IST
    - cron: '45 11 * * *'  # 5:15 PM IST
    - cron: '30 14 * * *'  # 8:00 PM IST
  workflow_dispatch:        # allows manual trigger too

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run Naukri script
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: |
          python Naukri_automation.py

      - name: Upload screenshot if error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: naukri_error.png
